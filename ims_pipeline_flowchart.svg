<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1220" viewBox="0 0 1500 1220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="cardE" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#93c5fd"/>
    </marker>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .box-title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .box-sub { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .line { stroke: #93c5fd; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="1220" fill="url(#bg)"/>

  <text x="750" y="58" text-anchor="middle" class="title">IMS Streaming Analytics Pipeline</text>
  <text x="750" y="88" text-anchor="middle" class="subtitle">Ingestion -> Event Streaming -> Real-Time Processing -> Storage -> ML + Visualization</text>

  <!-- Main vertical flow -->
  <g filter="url(#shadow)">
    <rect x="560" y="130" rx="18" ry="18" width="380" height="96" fill="url(#cardA)" stroke="#60a5fa" stroke-width="2"/>
    <text x="750" y="170" text-anchor="middle" class="box-title">IMS</text>
    <text x="750" y="198" text-anchor="middle" class="box-sub">(Log Source)</text>

    <rect x="560" y="270" rx="18" ry="18" width="380" height="96" fill="url(#cardC)" stroke="#38bdf8" stroke-width="2"/>
    <text x="750" y="310" text-anchor="middle" class="box-title">Datastream</text>
    <text x="750" y="338" text-anchor="middle" class="box-sub">(TCP/IP)</text>

    <rect x="560" y="410" rx="18" ry="18" width="380" height="96" fill="url(#cardA)" stroke="#60a5fa" stroke-width="2"/>
    <text x="750" y="450" text-anchor="middle" class="box-title">TCP Listener</text>

    <rect x="560" y="550" rx="18" ry="18" width="380" height="108" fill="url(#cardB)" stroke="#a78bfa" stroke-width="2"/>
    <text x="750" y="590" text-anchor="middle" class="box-title">Apache Kafka</text>
    <text x="750" y="620" text-anchor="middle" class="box-sub">(Event Streaming)</text>

    <rect x="430" y="710" rx="18" ry="18" width="640" height="162" fill="url(#cardC)" stroke="#22d3ee" stroke-width="2"/>
    <text x="750" y="752" text-anchor="middle" class="box-title">Spark Structured Streaming</text>
    <text x="750" y="786" text-anchor="middle" class="box-sub">- Parsing</text>
    <text x="750" y="814" text-anchor="middle" class="box-sub">- Aggregation</text>
    <text x="750" y="842" text-anchor="middle" class="box-sub">- Metric Computation</text>
  </g>

  <!-- Branches -->
  <g filter="url(#shadow)">
    <rect x="170" y="920" rx="16" ry="16" width="430" height="96" fill="url(#cardD)" stroke="#22c55e" stroke-width="2"/>
    <text x="385" y="960" text-anchor="middle" class="box-title">HDFS</text>
    <text x="385" y="988" text-anchor="middle" class="box-sub">(Parquet Files)</text>

    <rect x="820" y="920" rx="16" ry="16" width="430" height="96" fill="url(#cardE)" stroke="#f472b6" stroke-width="2"/>
    <text x="1035" y="960" text-anchor="middle" class="box-title">Real-Time Metrics</text>

    <rect x="170" y="1040" rx="16" ry="16" width="430" height="96" fill="url(#cardA)" stroke="#60a5fa" stroke-width="2"/>
    <text x="385" y="1080" text-anchor="middle" class="box-title">ML Training</text>
    <text x="385" y="1108" text-anchor="middle" class="box-sub">(scikit-learn)</text>

    <rect x="820" y="1040" rx="16" ry="16" width="430" height="96" fill="url(#cardA)" stroke="#60a5fa" stroke-width="2"/>
    <text x="1035" y="1080" text-anchor="middle" class="box-title">Grafana</text>
    <text x="1035" y="1108" text-anchor="middle" class="box-sub">Dashboards</text>
  </g>

  <!-- Arrows main -->
  <path class="line" d="M750 226 L750 268"/>
  <path class="line" d="M750 366 L750 408"/>
  <path class="line" d="M750 506 L750 548"/>
  <path class="line" d="M750 658 L750 708"/>

  <!-- Arrows branches -->
  <path class="line" d="M640 872 C620 900, 540 910, 480 920"/>
  <path class="line" d="M860 872 C880 900, 960 910, 1020 920"/>
  <path class="line" d="M385 1016 L385 1038"/>
  <path class="line" d="M1035 1016 L1035 1038"/>

</svg>
