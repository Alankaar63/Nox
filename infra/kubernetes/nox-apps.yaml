apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator
  namespace: nox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-orchestrator
  template:
    metadata:
      labels:
        app: ai-orchestrator
    spec:
      containers:
        - name: ai-orchestrator
          image: nox/ai-orchestrator:latest
          ports:
            - containerPort: 8090
          env:
            - name: OPENAI_BASE_URL
              value: http://vllm:8000/v1
            - name: VECTOR_STORE_URL
              value: http://weaviate:8080
---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator
  namespace: nox
spec:
  selector:
    app: ai-orchestrator
  ports:
    - port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-core-api
  namespace: nox
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rust-core-api
  template:
    metadata:
      labels:
        app: rust-core-api
    spec:
      containers:
        - name: rust-core-api
          image: nox/rust-core-api:latest
          ports:
            - containerPort: 8091
          env:
            - name: CASSANDRA_URL
              value: cassandra:9042
            - name: KAFKA_BROKERS
              value: kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: rust-core-api
  namespace: nox
spec:
  selector:
    app: rust-core-api
  ports:
    - port: 8091
      targetPort: 8091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-workers
  namespace: nox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-workers
  template:
    metadata:
      labels:
        app: go-workers
    spec:
      containers:
        - name: go-workers
          image: nox/go-workers:latest
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: INFLUX_URL
              value: http://influxdb:8086
